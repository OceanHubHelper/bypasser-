<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta Key Bypasser</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: #00ff9d;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      max-width: 600px;
      margin: 0 auto 20px;
    }
    input {
      width: 90%;
      max-width: 700px;
      padding: 16px;
      font-size: 17px;
      background: #1f1f1f;
      border: 2px solid #00ff9d;
      color: white;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    button {
      background: #00ff9d;
      color: black;
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #00cc7a;
    }
    #result {
      margin-top: 30px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 12px;
      min-height: 120px;
      text-align: left;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      word-break: break-all;
    }
    .key {
      font-size: 1.4rem;
      color: #00ff9d;
      background: #112211;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      display: inline-block;
    }
    .copy-btn {
      background: #333;
      color: #00ff9d;
      padding: 8px 16px;
      border: 1px solid #00ff9d;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🔑 Delta Key Bypasser</h1>
  <p>Paste your auth.platorelay.com link → Get key in fastest time</p>

  <input type="text" id="urlInput" placeholder="https://auth.platorelay.com/a?d=..." autocomplete="off">

  <button onclick="startBypass()">Bypass & Get Key</button>

  <div id="result"></div>

  <script>
    async function startBypass() {
      const input = document.getElementById('urlInput').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!input) {
        resultDiv.innerHTML = '<p style="color:red">Please paste the link first</p>';
        return;
      }

      resultDiv.innerHTML = '<p>⚡ Bypassing as fast as possible...</p>';

      try {
        const res = await fetch('/bypass', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: input })
        });

        const data = await res.json();

        if (data.success) {
          let html = `<p style="color:#00ff9d">✅ Fastest bypass options:</p>`;
          
          data.bypassLinks.forEach((link, i) => {
            html += `
              <p>
                <a href="${link}" target="_blank" style="color:#00ff9d; font-size:18px;">
                  → Option ${i+1}: Open Fast Bypasser
                </a>
              </p>`;
          });

          html += `
            <p style="margin-top:25px; color:#aaa">
              After opening, complete any quick step if asked.<br>
              The key will appear in format: <strong>FREE_****************</strong>
            </p>`;

          resultDiv.innerHTML = html;
        }
      } catch (e) {
        resultDiv.innerHTML = `
          <p style="color:orange">Server busy. Try this directly (fastest right now):</p>
          <a href="https://keybypass.net/?url=${encodeURIComponent(input)}" target="_blank" style="color:#00ff9d; font-size:20px;">
            👉 Open KeyBypass.net (Recommended)
          </a>
        `;
      }
    }

    // Press Enter to bypass
    document.getElementById('urlInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startBypass();
    });
  </script>
</body>
</html>
