<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrien’s Bypass</title>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: #00ff9d; text-align: center; padding: 60px 20px; }
    h1 { font-size: 3rem; }
    input { width: 90%; max-width: 700px; padding: 18px; background: #1f1f1f; border: 2px solid #00ff9d; color: white; border-radius: 12px; font-size: 17px; margin: 20px 0; }
    button { background: #00ff9d; color: black; border: none; padding: 18px 50px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; }
    button:hover { background: #00e68a; }
    #result { margin-top: 40px; padding: 25px; background: #1a1a1a; border-radius: 12px; min-height: 150px; text-align: left; max-width: 700px; margin-left: auto; margin-right: auto; }
    .key { background: #112211; padding: 15px; border-radius: 8px; font-size: 1.35rem; word-break: break-all; margin: 15px 0; }
  </style>
</head>
<body>
  <h1>Adrien’s Bypass</h1>
  <p>Your own Delta Key Automator</p>

  <input type="text" id="urlInput" placeholder="Paste your auth.platorelay.com link..." value="https://auth.platorelay.com/a?d=cGoF8KlVvrXRCSTWZRk6bWVccXGxljechLPLS08sRWONLtHdzOTOEMa27xaoetPAba2KR4PW1fi7KOjzEmaUlQ44zSu4fTJ0fRNVOigM7SSM56FErRrRanMIO07WN3FPYttOpsHSk8T44GRF7AZzQHTXs3Qm8rnMcCpeh2dswfBHcJx5XgXJOFso9QuMYnpmkvOPcJulLryl1lXfJnPWgA8RYeBj5U7mc9n37NyrhvfRyZDeImeof6Y1ECKAwvsJaGSFloXKfDQS4JNr4idTPUdztwDKbSauHLORUYLLyJO9WuPqh8iBsKS4U5fCb7s1AdBVm7X4ZxB8ppFtSyxg9FDuYjODiZ3Ojp5gv4vC0DMxXO7iziCkkqA7MT8OAJcD4whPG6lXGQrWTIcYxbbzVEH1KEbIvC7VoJ4MQwfyZSMsOoAlXSbS6u0SjUxHDt">

  <button onclick="startBypass()">Start Adrien’s Bypass</button>

  <div id="result"></div>

  <script>
    async function startBypass() {
      const url = document.getElementById('urlInput').value.trim();
      const result = document.getElementById('result');

      if (!url) return result.innerHTML = '<p style="color:red">Paste the link first</p>';

      result.innerHTML = '<p>🚀 Starting Adrien’s Bypass (headless browser)... This can take 30-60 seconds.</p>';

      try {
        const res = await fetch('/bypass', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        result.innerHTML = `
          <p style="color:#00ff9d">${data.message}</p>
          <p>Waiting for key page...</p>
          <div class="key">FREE_xxxxxxxxxxxxxxxxxxxxxxxx (check console or final page)</div>
          <button onclick="copyKey(this)">Copy Key</button>
        `;
      } catch(e) {
        result.innerHTML = '<p style="color:orange">Error starting browser. Try again.</p>';
      }
    }

    function copyKey(btn) {
      const key = "FREE_6cbc707beb61fea020b2e0f6e4e71dab"; // replace with real key when visible
      navigator.clipboard.writeText(key);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy Key", 2000);
    }
  </script>
</body>
</html>
